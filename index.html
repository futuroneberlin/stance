<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FUTUR ONE — Living Glossary</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page splitLayout">
    <section class="leftPanel">
      <div class="panel tickerPanel" aria-live="polite">
        <div class="panelTitleRow">
          <h2 class="panelTitle">Worldwide open web</h2>
          <span id="tickerSource" class="sourceTag sourceTag--unknown">Loading</span>
        </div>
        <div id="tickerWord" class="tickerWord">Loading latest terms…</div>
      </div>

      <div class="panel surveyPanel">
        <h1 class="q">I acted through art today by…</h1>

        <form id="stanceForm" class="form">
          <label class="srOnly" for="inputField">Your art action</label>
          <input
            id="inputField"
            type="text"
            placeholder="Write your action"
            maxlength="220"
            autocomplete="off"
          />

          <div class="row row--stackMobile">
            <label class="srOnly" for="categorySelect">Category</label>
            <select id="categorySelect">
              <option value="general">General</option>
              <option value="making">Making</option>
              <option value="care">Care</option>
              <option value="resistance">Resistance</option>
              <option value="learning">Learning</option>
            </select>
            <button id="submitBtn" class="btn" type="submit">Add Entry</button>
          </div>

          <p id="status" class="status" aria-live="polite"></p>
        </form>
      </div>

      <div class="panel recentPanel">
        <h2 class="panelTitle">Your recent entries</h2>
        <ul id="recentEntries" class="recentList"></ul>
      </div>
    </section>

    <section class="rightPanel">
      <div class="panel networkPanel">
        <div class="panelTitleRow">
          <h2 class="panelTitle">Living Glossary Mapping</h2>
          <div class="controlsRow">
            <label class="toggleWrap">
              <input id="showAllNodesToggle" type="checkbox" />
              <span>Show all nodes</span>
            </label>
            <button id="refreshNowBtn" class="btn btn--small" type="button">Refresh now</button>
          </div>
        </div>

        <div id="liveStatus" class="liveStatus">Loading latest updates…</div>
        <div id="lastRefreshed" class="lastRefreshed"></div>

        <div id="networkContainer" class="networkContainer"></div>
      </div>

      <div class="panel summaryPanel">
        <h2 class="panelTitle">Living Glossary Summary</h2>

        <div class="summaryGrid">
          <div>
            <h3 class="summaryTitle">Trending terms</h3>
            <ul id="trendingList" class="trendingList"></ul>
          </div>
          <div>
            <h3 class="summaryTitle">Source counts</h3>
            <ul id="sourceCounts" class="sourceCounts"></ul>
          </div>
        </div>

        <div id="trendChart" class="trendChart"></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="script.js"></script>
</body>
</html>
